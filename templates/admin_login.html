{% extends 'base.html' %}
{% block title %}Admin Login — VisionVerse{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card card">
        <div style="text-align: center;">
            <span class="section-icon" style="text-align: center; display: block;">⚙️</span>
            <h1 class="heading-xl" style="text-align: center;">Admin Portal</h1>
            <p class="subtitle" style="text-align: center;">Sign in to manage VisionVerse.</p>
        </div>

        <form id="adminLoginForm" novalidate>
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%;">Sign In</button>
        </form>

        <div id="error-msg" style="color: var(--red); margin-top: 15px; text-align: center; display: none; font-weight: 600; font-size: 0.9em;"></div>
        
        <p class="auth-link" style="text-align: center; margin-top: 25px;">
            <a href="/">Back to Student Area</a>
        </p>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';
    errorMsg.style.display = 'none';

    try {
        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });

        const data = await res.json();

        if (res.ok && data.status === 'success') {
            window.location.href = '/admin/dashboard';
        } else {
            errorMsg.textContent = data.message || 'Invalid credentials';
            errorMsg.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
        }

    } catch (err) {
        errorMsg.textContent = 'Network error occurred';
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
    }
});
</script>

{% endblock %}
