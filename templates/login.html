{% extends 'base.html' %}
{% block title %}Login — VisionVerse{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card card">
        <div class="text-center">
            <span class="section-icon">🔐</span>
            <h1 class="heading-xl">Welcome back</h1>
            <p class="subtitle">Sign in to continue to VisionVerse.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="identifier">Student ID or Email</label>
                <input type="text" id="identifier" class="form-control" placeholder="Enter your Student ID or Email"
                    required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
        <p class="auth-link" style="margin-top: 10px;"><a href="/admin/login" style="color: #94a3b8;">Go to Admin Portal &rarr;</a></p>
    </div>
</div>
<div class="toast-container" id="toast-container"></div>

<script>
    function showToast(msg, type) {
        type = type || 'info';
        var icons = { success: '✓', error: '✗', info: 'ℹ' };
        var c = document.getElementById('toast-container');
        var t = document.createElement('div');
        t.className = 'toast ' + type;
        t.innerHTML = '<span>' + (icons[type] || 'ℹ') + '</span> ' + msg;
        c.appendChild(t);
        setTimeout(function () { t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 300); }, 3500);
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var identifier = document.getElementById('identifier').value.trim();
        var password = document.getElementById('password').value;

        if (!identifier) { showToast('Please enter your Student ID or Email', 'error'); return; }
        if (!password) { showToast('Please enter your password', 'error'); return; }

        var btn = document.getElementById('login-btn');
        btn.disabled = true; btn.textContent = 'Signing in...';

        try {
            var res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: identifier, password: password })
            });
            var result = await res.json();
            if (result.status === 'success') {
                showToast('Login successful!', 'success');
                setTimeout(function () { window.location.href = '/home'; }, 800);
            } else {
                showToast(result.message || 'Invalid credentials', 'error');
                btn.disabled = false; btn.textContent = 'Sign In';
                var card = document.querySelector('.auth-card');
                card.style.animation = 'none'; card.offsetHeight;
                card.style.animation = 'shake 0.4s ease';
            }
        } catch (err) {
            showToast('Network error — please try again', 'error');
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    });
</script>
<style>
    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-6px);
        }

        75% {
            transform: translateX(6px);
        }
    }
</style>
{% endblock %}
